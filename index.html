<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Music Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
</head>

<body>

<div class="container">

<h1>🎵 AI Music Generation</h1>

<div class="card">
<h2>1. Dataset Collection</h2>

<input
type="file"
id="midiFiles"
multiple
accept=".mid,.midi">

<p id="fileCount">
No MIDI files selected
</p>
</div>

<div class="card">
<h2>2. Preprocessing</h2>

<button id="preprocessBtn">
Preprocess Dataset
</button>

<div id="preprocessResult"></div>
</div>

<div class="card">
<h2>3. Train Model</h2>

<button id="trainBtn">
Train LSTM
</button>

<div class="progress-container">
<div id="trainProgress" class="progress-bar"></div>
</div>

<p id="trainingStatus"></p>
</div>

<div class="card">
<h2>4. Generate Music</h2>

<button id="generateBtn">
Generate Sequence
</button>

<textarea
id="generatedMusic"
rows="8"
readonly>
</textarea>
</div>

<div class="card">
<h2>5. Audio Preview</h2>

<audio
id="audioPlayer"
controls>
</audio>
</div>

<div class="card">
<h2>6. Download MP3</h2>

<button id="downloadBtn">
Download MP3
</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
